<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker | Anime & Donghua</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%233b82f6"/><stop offset="100%" stop-color="%23a855f7"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="%231e293b"/><circle cx="50" cy="50" r="42" stroke="url(%23g)" stroke-width="5" stroke-dasharray="25 10" fill="none"/><polygon points="42,32 42,68 70,50" fill="url(%23g)"/></svg>'>
</head>
<body class="min-h-screen p-4 md:p-8 pb-20 flex flex-col">

    <div id="loginScreen" class="flex-1 flex flex-col items-center justify-center fade-in">
        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-md w-full shadow-2xl">
            <div class="w-24 h-24 mx-auto mb-6 flex items-center justify-center drop-shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full animate-[spin_20s_linear_infinite]">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="#1e293b" fill-opacity="0.5"/>
                    <circle cx="50" cy="50" r="42" stroke="url(#logoGrad)" stroke-width="3" stroke-dasharray="30 15 10 15" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="35" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6" stroke-dasharray="5 5"/>
                    <polygon points="42,32 42,68 70,50" fill="url(#logoGrad)" filter="url(#glow)"/>
                </svg>
            </div>
            
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-4">Tracker Login</h1>
            <p class="text-slate-400 mb-8">Masuk untuk menyimpan dan menyinkronkan daftar tontonanmu di semua perangkat.</p>
            
            <button id="loginBtn" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 font-bold py-3 px-6 rounded-xl hover:bg-slate-200 transition active:scale-95">
                <svg class="w-6 h-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Lanjutkan dengan Google
            </button>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto w-full hidden fade-in">
        
        <div class="glass-panel p-3 md:p-4 rounded-xl mb-8 flex justify-end">
            <div class="top-right-utilities">
                <div class="profile-info">
                    <div class="profile-text-container hidden sm:flex">
                        <p id="userName" class="profile-name"></p>
                        <p class="profile-role">Cultivator Aktif</p>
                    </div>
                    <img id="userAvatar" src="" alt="Profile" class="profile-image">
                </div>
                <button id="logoutBtn" class="text-sm bg-red-600 hover:bg-red-500 text-white py-2 px-4 rounded-lg transition active:scale-95">Logout</button>
            </div>
        </div>

        <header class="mb-10 text-center mt-4 flex flex-col items-center justify-center">
            <div class="w-20 h-20 md:w-24 md:h-24 mb-4 flex items-center justify-center drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full animate-[spin_20s_linear_infinite]">
                    <defs>
                        <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                        <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="#1e293b" fill-opacity="0.5"/>
                    <circle cx="50" cy="50" r="42" stroke="url(#logoGrad2)" stroke-width="3" stroke-dasharray="30 15 10 15" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="35" stroke="url(#logoGrad2)" stroke-width="1" opacity="0.6" stroke-dasharray="5 5"/>
                    <polygon points="42,32 42,68 70,50" fill="url(#logoGrad2)" filter="url(#glow2)"/>
                </svg>
            </div>
            
            <h1 class="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2 leading-tight">
                Otaku & Cultivator
            </h1>
        </header>

        <div class="glass-panel p-5 md:p-6 rounded-2xl mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <input type="text" id="inputTitle" placeholder="Judul Anime / Donghua..." class="lg:col-span-2 w-full bg-slate-800 border border-slate-600 rounded-lg p-3 md:p-4 focus:outline-none focus:border-blue-400 text-white text-base">
                
                <select id="inputType" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 md:p-4 focus:outline-none focus:border-blue-400 text-white text-base appearance-none">
                    <option value="Anime">🇯🇵 Anime</option>
                    <option value="Donghua">🇨🇳 Donghua</option>
                </select>
                
                <input type="number" id="inputEpisode" placeholder="Ep Saat Ini" min="0" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 md:p-4 focus:outline-none focus:border-blue-400 text-white text-base">
                
                <div class="flex flex-col gap-1 justify-center">
                    <input type="file" id="inputPosterFile" accept="image/*" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2 text-sm text-slate-300 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white cursor-pointer hover:file:bg-blue-500">
                </div>
            </div>
            
            <div class="mt-6 flex justify-end items-center gap-4">
                <div id="loading" class="loader"></div>
                <button id="addBtn" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 md:py-4 px-8 rounded-lg shadow-lg active:scale-95 transition">
                    + Tambahkan ke Daftar
                </button>
            </div>
        </div>

        <div class="flex justify-center md:justify-start gap-2 mb-6 border-b border-slate-700 pb-4 overflow-x-auto">
            <button onclick="setFilter('All')" class="tab-btn active w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]" data-filter="All">
                Semua
            </button>
            <button onclick="setFilter('Anime')" class="tab-btn w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-slate-800 text-slate-400 hover:bg-slate-700" data-filter="Anime">
                🇯🇵 Anime
            </button>
            <button onclick="setFilter('Donghua')" class="tab-btn w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-slate-800 text-slate-400 hover:bg-slate-700" data-filter="Donghua">
                🇨🇳 Donghua
            </button>
        </div>
        
        <div id="showList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4HlorZBNwwHFp8LFi9W6yruxbwKhMMcU",
            authDomain: "otaku-cultivator.firebaseapp.com",
            databaseURL: "https://otaku-cultivator-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "otaku-cultivator",
            storageBucket: "otaku-cultivator.firebasestorage.app",
            messagingSenderId: "789190822951",
            appId: "1:789190822951:web:15cffc00d86fe9382cd202"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUserUid = null;
        let tempImageUrl = '';
        let allShowsData = []; 
        let currentFilter = 'All';

        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => alert("Gagal Login: " + err.message));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                document.getElementById('showList').innerHTML = ''; 
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userAvatar').src = user.photoURL;
                
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                
                loadUserData(user.uid);
            } else {
                currentUserUid = null;
                mainApp.classList.add('hidden');
                loginScreen.classList.remove('hidden');
            }
        });

        document.getElementById('inputPosterFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = 400 / img.width; 
                        canvas.width = 400;
                        canvas.height = img.height * scaleSize;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        tempImageUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    }
                };
            } else {
                tempImageUrl = '';
            }
        });

        function loadUserData(uid) {
            const userShowsRef = ref(db, `users/${uid}/shows`);
            onValue(userShowsRef, (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    allShowsData = [];
                } else {
                    allShowsData = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
                }
                renderShowsUI();
            });
        }

        function renderShowsUI() {
            const container = document.getElementById('showList');
            container.innerHTML = '';

            const filteredShows = currentFilter === 'All' 
                ? allShowsData 
                : allShowsData.filter(show => show.type === currentFilter);

            if (filteredShows.length === 0) {
                const pesan = currentFilter === 'All' ? "Belum ada tontonan yang dicatat." : `Belum ada ${currentFilter} di daftarmu.`;
                container.innerHTML = `<p class="text-slate-500 italic col-span-full text-center py-10 fade-in">${pesan}</p>`;
                return;
            }

            filteredShows.forEach((show) => {
                const typeColor = show.type === 'Anime' ? 'bg-blue-900 text-blue-200 border-blue-500' : 'bg-red-900 text-red-200 border-red-500';
                const imageSection = show.imageUrl 
                    ? `<img src="${show.imageUrl}" class="w-full h-56 md:h-48 object-cover object-top">`
                    : `<div class="w-full h-56 md:h-48 image-fallback flex items-center justify-center text-white font-bold text-3xl opacity-80">${show.title.charAt(0)}</div>`;

                const card = document.createElement('div');
                card.className = "glass-panel rounded-xl overflow-hidden flex flex-col fade-in";
                card.innerHTML = `
                    ${imageSection}
                    <div class="p-4 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-4 gap-2">
                            <h3 class="text-lg font-bold leading-tight flex-1 line-clamp-2">${show.title}</h3>
                            <span class="text-[10px] md:text-xs font-semibold px-2 py-1 rounded border ${typeColor} whitespace-nowrap">${show.type}</span>
                        </div>
                        
                        <div class="mt-auto pt-2 flex items-center justify-between border-t border-slate-700">
                            <div class="flex items-center gap-2 mt-3">
                                <button data-id="${show.id}" data-ep="${show.episode}" data-action="minus" class="ep-btn w-10 h-10 flex justify-center items-center bg-slate-700 active:bg-slate-600 rounded-lg text-xl font-bold transition">-</button>
                                
                                <div class="text-center min-w-[3.5rem]">
                                    <span class="text-[10px] block text-slate-400 uppercase tracking-wider">Episode</span>
                                    <span class="text-2xl font-mono font-bold">${show.episode}</span>
                                </div>
                                
                                <button data-id="${show.id}" data-ep="${show.episode}" data-action="plus" class="ep-btn w-10 h-10 flex justify-center items-center bg-blue-600 active:bg-blue-500 rounded-lg text-xl font-bold transition">+</button>
                            </div>
                            
                            <button data-id="${show.id}" class="del-btn text-slate-500 hover:text-red-400 p-2 mt-3 transition active:scale-90" title="Hapus Tontonan">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            attachEventListeners();
        }

        window.setFilter = function(filterType) {
            currentFilter = filterType;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.getAttribute('data-filter') === filterType) {
                    btn.className = "tab-btn active w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]";
                } else {
                    btn.className = "tab-btn w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-slate-800 text-slate-400 hover:bg-slate-700";
                }
            });

            renderShowsUI();
        }

        document.getElementById('addBtn').addEventListener('click', async () => {
            if (!currentUserUid) return alert("Silakan login terlebih dahulu!");
            
            const title = document.getElementById('inputTitle').value.trim();
            const type = document.getElementById('inputType').value;
            const episode = parseInt(document.getElementById('inputEpisode').value) || 0;
            
            if (!title) return alert("Judul tidak boleh kosong!");

            document.getElementById('loading').style.display = 'block';
            const userShowsRef = ref(db, `users/${currentUserUid}/shows`);

            try {
                await push(userShowsRef, { title, type, episode, imageUrl: tempImageUrl });
                
                document.getElementById('inputTitle').value = '';
                document.getElementById('inputEpisode').value = '';
                document.getElementById('inputPosterFile').value = '';
                tempImageUrl = '';
                
                setFilter('All');
                
            } catch (error) {
                alert("Gagal menyimpan data: " + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        function attachEventListeners() {
            document.querySelectorAll('.ep-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    let currentEp = parseInt(e.currentTarget.getAttribute('data-ep'));
                    const action = e.currentTarget.getAttribute('data-action');
                    
                    let newEp = action === 'plus' ? currentEp + 1 : Math.max(0, currentEp - 1);
                    
                    update(ref(db, `users/${currentUserUid}/shows/${id}`), { episode: newEp });
                });
            });

            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (confirm("Yakin ingin menghapus tontonan ini?")) {
                        const id = e.currentTarget.getAttribute('data-id');
                        remove(ref(db, `users/${currentUserUid}/shows/${id}`));
                    }
                });
            });
        }
    </script>
</body>
</html>
