<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker | Anime & Donghua</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%233b82f6"/><stop offset="100%" stop-color="%23a855f7"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="%231e293b"/><circle cx="50" cy="50" r="42" stroke="url(%23g)" stroke-width="5" stroke-dasharray="25 10" fill="none"/><polygon points="42,32 42,68 70,50" fill="url(%23g)"/></svg>'>
</head>
<body class="min-h-screen p-4 md:p-8 pb-20 flex flex-col relative bg-slate-900 text-white">

    <div id="loginScreen" class="flex-1 flex flex-col items-center justify-center fade-in">
        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-md w-full shadow-2xl border border-slate-700 bg-slate-800/50">
            
            <div class="w-24 h-24 mx-auto mb-6 flex items-center justify-center drop-shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full animate-[spin_20s_linear_infinite]">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="#1e293b" fill-opacity="0.5"/>
                    <circle cx="50" cy="50" r="42" stroke="url(#logoGrad)" stroke-width="3" stroke-dasharray="30 15 10 15" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="35" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6" stroke-dasharray="5 5"/>
                    <polygon points="42,32 42,68 70,50" fill="url(#logoGrad)" filter="url(#glow)"/>
                </svg>
            </div>

            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">Tracker Login</h1>
            <p class="text-slate-400 mb-6 text-sm">Gunakan Email dan Password untuk masuk ke aplikasi.</p>
            
            <div class="flex flex-col gap-3">
                <input type="email" id="inputEmail" placeholder="Masukkan Email..." class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-400 text-white">
                
                <input type="password" id="inputPassword" placeholder="Masukkan Password..." class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-400 text-white mb-2">
                
                <div class="flex gap-2">
                    <button id="loginBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition active:scale-95 text-sm">
                        Masuk
                    </button>
                    <button id="registerBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl transition active:scale-95 text-sm">
                        Daftar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto w-full hidden fade-in">
        
        <div class="flex justify-end items-center mb-6 gap-4">
            <button id="logoutBtn" class="p-2 text-slate-400 hover:text-red-400 hover:bg-slate-800 rounded-full transition active:scale-95" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
            <img id="userAvatar" src="" alt="Profile" class="w-9 h-9 md:w-10 md:h-10 rounded-full object-cover ring-2 ring-transparent bg-slate-800">
        </div>

        <header class="mb-10 text-center mt-2 flex flex-col items-center justify-center">
            <div class="w-20 h-20 md:w-24 md:h-24 mb-4 flex items-center justify-center drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full animate-[spin_20s_linear_infinite]">
                    <defs>
                        <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                        <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="#1e293b" fill-opacity="0.5"/>
                    <circle cx="50" cy="50" r="42" stroke="url(#logoGrad2)" stroke-width="3" stroke-dasharray="30 15 10 15" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="35" stroke="url(#logoGrad2)" stroke-width="1" opacity="0.6" stroke-dasharray="5 5"/>
                    <polygon points="42,32 42,68 70,50" fill="url(#logoGrad2)" filter="url(#glow2)"/>
                </svg>
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2 leading-tight">
                Otaku & Cultivator
            </h1>
        </header>

        <div class="glass-panel p-5 md:p-6 rounded-2xl mb-10 border border-slate-700 bg-slate-800/40">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <input type="text" id="inputTitle" placeholder="Judul Anime / Donghua..." class="lg:col-span-2 w-full bg-slate-800 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-400 text-white">
                
                <select id="inputType" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-400 text-white appearance-none">
                    <option value="Anime">🇯🇵 Anime</option>
                    <option value="Donghua">🇨🇳 Donghua</option>
                </select>
                
                <input type="number" id="inputEpisode" placeholder="Ep Saat Ini" min="0" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-400 text-white">
                
                <input type="file" id="inputPosterFile" accept="image/*" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2 text-sm text-slate-300">
            </div>
            
            <div class="mt-6 flex justify-end">
                <button id="addBtn" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg active:scale-95 transition">
                    + Tambahkan ke Daftar
                </button>
            </div>
        </div>

        <div class="flex justify-center md:justify-start gap-2 mb-6 border-b border-slate-700 pb-4 overflow-x-auto">
            <button onclick="setFilter('All')" class="tab-btn active px-6 py-2 rounded-full font-bold bg-blue-600 text-white" data-filter="All">Semua</button>
            <button onclick="setFilter('Anime')" class="tab-btn px-6 py-2 rounded-full font-bold bg-slate-800 text-slate-400" data-filter="Anime">🇯🇵 Anime</button>
            <button onclick="setFilter('Donghua')" class="tab-btn px-6 py-2 rounded-full font-bold bg-slate-800 text-slate-400" data-filter="Donghua">🇨🇳 Donghua</button>
        </div>
        
        <div id="showList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 fade-in"></div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-6 rounded-2xl w-full max-w-md mx-4 bg-slate-900 border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-blue-400">Edit Tontonan</h2>
            <div class="flex flex-col gap-5">
                
                <input type="text" id="editTitle" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white">
                
                <select id="editType" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white">
                    <option value="Anime">🇯🇵 Anime</option>
                    <option value="Donghua">🇨🇳 Donghua</option>
                </select>
                
                <input type="file" id="editPosterFile" accept="image/*" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2 text-white">
                
                <div class="flex justify-end gap-3 mt-4 border-t border-slate-700 pt-4">
                    <button onclick="closeEditModal()" class="px-5 py-2 rounded-lg bg-slate-700 text-white">Batal</button>
                    <button id="saveEditBtn" class="px-5 py-2 rounded-lg bg-blue-600 text-white font-bold">Simpan</button>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";
        
        // Import khusus Email & Password dan Persistence (Tanpa Email Link)
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut, 
            setPersistence, 
            indexedDBLocalPersistence 
        } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4HlorZBNwwHFp8LFi9W6yruxbwKhMMcU",
            authDomain: "otaku-cultivator.firebaseapp.com",
            databaseURL: "https://otaku-cultivator-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "otaku-cultivator",
            storageBucket: "otaku-cultivator.firebasestorage.app",
            messagingSenderId: "789190822951",
            appId: "1:789190822951:web:15cffc00d86fe9382cd202"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Mengatur agar sesi login awet di dalam APK Median.co
        setPersistence(auth, indexedDBLocalPersistence).catch((error) => {
            console.error("Gagal mengatur persistence:", error);
        });

        let currentUserUid = null;
        let tempImageUrl = '';
        let allShowsData = []; 
        let currentFilter = 'All';
        let editingId = null;
        let editTempImageUrl = '';

        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');

        // ==========================================
        // FUNGSI EMAIL & PASSWORD BIASA
        // ==========================================
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('inputEmail').value;
            const pass = document.getElementById('inputPassword').value;
            
            if (!email || !pass) {
                alert("Isi Email dan Password dengan lengkap!");
                return;
            }
            
            signInWithEmailAndPassword(auth, email, pass).catch((err) => {
                alert("Gagal Masuk: Pastikan email dan password yang Anda masukkan benar.");
            });
        });

        document.getElementById('registerBtn').addEventListener('click', () => {
            const email = document.getElementById('inputEmail').value;
            const pass = document.getElementById('inputPassword').value;
            
            if (!email || !pass) {
                alert("Isi Email dan Password untuk membuat akun baru!");
                return;
            }
            
            if (pass.length < 6) {
                alert("Password minimal harus 6 karakter!");
                return;
            }
            
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    alert("Pendaftaran Berhasil! Akun Anda telah dibuat dan masuk otomatis.");
                })
                .catch((err) => {
                    alert("Gagal Daftar: " + err.message);
                });
        });

        // ==========================================
        // FUNGSI LOGOUT
        // ==========================================
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                document.getElementById('showList').innerHTML = ''; 
                document.getElementById('inputEmail').value = '';
                document.getElementById('inputPassword').value = '';
            });
        });

        // ==========================================
        // CEK STATUS LOGIN USER (LISTENER)
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserUid = user.uid;
                
                const avatarImg = document.getElementById('userAvatar');
                // Menggunakan API pihak ketiga untuk membuat foto profil otomatis dari UID
                avatarImg.src = `https://api.dicebear.com/7.x/bottts/svg?seed=${user.uid}`;
                avatarImg.title = user.email;
                
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                
                loadUserData(user.uid);
            } else {
                currentUserUid = null;
                mainApp.classList.add('hidden');
                loginScreen.classList.remove('hidden');
            }
        });

        // ==========================================
        // FUNGSI KOMPRESI GAMBAR (CANVAS)
        // ==========================================
        document.getElementById('inputPosterFile').addEventListener('change', (e) => {
            compressImage(e.target.files[0], (res) => {
                tempImageUrl = res;
            });
        });

        document.getElementById('editPosterFile').addEventListener('change', (e) => {
            compressImage(e.target.files[0], (res) => {
                editTempImageUrl = res;
            });
        });

        function compressImage(file, callback) {
            if (!file) { 
                callback(''); 
                return; 
            }
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    // Menentukan ukuran skala gambar (Maksimal lebar 400px)
                    const scaleSize = 400 / img.width; 
                    
                    canvas.width = 400; 
                    canvas.height = img.height * scaleSize;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Kualitas diatur ke 0.7 agar ukuran data tidak membebani database
                    callback(canvas.toDataURL('image/jpeg', 0.7)); 
                }
            };
        }

        // ==========================================
        // FUNGSI CRUD DATABASE (LOAD, SHOW, TAMBAH)
        // ==========================================
        function loadUserData(uid) {
            const userShowsRef = ref(db, `users/${uid}/shows`);
            onValue(userShowsRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allShowsData = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
                } else {
                    allShowsData = [];
                }
                renderShowsUI();
            });
        }

        function renderShowsUI() {
            const container = document.getElementById('showList');
            container.innerHTML = '';
            
            const filteredShows = currentFilter === 'All' 
                ? allShowsData 
                : allShowsData.filter(show => show.type === currentFilter);

            if (filteredShows.length === 0) {
                container.innerHTML = `<p class="text-slate-500 italic col-span-full text-center py-10">Belum ada tontonan di kategori ini.</p>`;
                return;
            }

            filteredShows.forEach((show) => {
                const typeColor = show.type === 'Anime' 
                    ? 'bg-blue-900 text-blue-200 border-blue-500' 
                    : 'bg-red-900 text-red-200 border-red-500';
                    
                const imageSection = show.imageUrl 
                    ? `<img src="${show.imageUrl}" class="w-full h-56 md:h-48 object-cover object-top">`
                    : `<div class="w-full h-56 md:h-48 flex items-center justify-center text-white font-bold text-3xl bg-slate-800">${show.title.charAt(0)}</div>`;

                const card = document.createElement('div');
                card.className = "glass-panel rounded-xl overflow-hidden flex flex-col fade-in border border-slate-700 bg-slate-800/50";
                
                card.innerHTML = `
                    ${imageSection}
                    <div class="p-4 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-4 gap-2">
                            <h3 class="text-lg font-bold leading-tight flex-1 line-clamp-2">${show.title}</h3>
                            <span class="text-[10px] md:text-xs font-semibold px-2 py-1 rounded border ${typeColor} whitespace-nowrap">${show.type}</span>
                        </div>
                        
                        <div class="mt-auto pt-2 flex items-center justify-between border-t border-slate-700">
                            
                            <div class="flex items-center gap-2 mt-3">
                                <button data-id="${show.id}" data-ep="${show.episode}" data-action="minus" class="ep-btn w-10 h-10 flex justify-center items-center bg-slate-700 rounded-lg text-xl font-bold hover:bg-slate-600 transition">-</button>
                                <div class="text-center min-w-[3.5rem]">
                                    <span class="text-[10px] block text-slate-400 uppercase">Episode</span>
                                    <span class="text-2xl font-mono font-bold">${show.episode}</span>
                                </div>
                                <button data-id="${show.id}" data-ep="${show.episode}" data-action="plus" class="ep-btn w-10 h-10 flex justify-center items-center bg-blue-600 rounded-lg text-xl font-bold hover:bg-blue-500 transition">+</button>
                            </div>
                            
                            <div class="flex gap-1 mt-3">
                                <button onclick="openEditModal('${show.id}')" class="text-slate-400 hover:text-blue-400 p-2 transition">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                </button>
                                <button data-id="${show.id}" class="del-btn text-slate-400 hover:text-red-400 p-2 transition">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                    </svg>
                                </button>
                            </div>
                            
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            attachEventListeners();
        }

        // ==========================================
        // FUNGSI FILTER & LOGIKA MODAL
        // ==========================================
        window.setFilter = function(filterType) {
            currentFilter = filterType;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.getAttribute('data-filter') === filterType) {
                    btn.className = "tab-btn active px-6 py-2 rounded-full font-bold bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]";
                } else {
                    btn.className = "tab-btn px-6 py-2 rounded-full font-bold bg-slate-800 text-slate-400 hover:bg-slate-700 transition";
                }
            });
            
            renderShowsUI();
        }

        window.openEditModal = function(id) {
            const show = allShowsData.find(s => s.id === id);
            if (!show) return;
            
            editingId = id;
            document.getElementById('editTitle').value = show.title;
            document.getElementById('editType').value = show.type;
            editTempImageUrl = show.imageUrl || '';
            
            document.getElementById('editModal').classList.remove('hidden', 'opacity-0');
        }

        window.closeEditModal = function() {
            document.getElementById('editModal').classList.add('opacity-0');
            setTimeout(() => { 
                document.getElementById('editModal').classList.add('hidden');
                editingId = null; 
            }, 300);
        }

        // ==========================================
        // FUNGSI SIMPAN EDIT & TAMBAH DATA
        // ==========================================
        document.getElementById('saveEditBtn').addEventListener('click', async () => {
            if (!editingId || !currentUserUid) return;
            
            const updateRef = ref(db, `users/${currentUserUid}/shows/${editingId}`);
            
            await update(updateRef, { 
                title: document.getElementById('editTitle').value, 
                type: document.getElementById('editType').value, 
                imageUrl: editTempImageUrl 
            });
            
            closeEditModal();
        });

        document.getElementById('addBtn').addEventListener('click', async () => {
            const title = document.getElementById('inputTitle').value.trim();
            
            if (!title) {
                alert("Judul tontonan tidak boleh kosong!");
                return;
            }
            
            const newShowRef = ref(db, `users/${currentUserUid}/shows`);
            
            await push(newShowRef, { 
                title: title, 
                type: document.getElementById('inputType').value, 
                episode: parseInt(document.getElementById('inputEpisode').value) || 0, 
                imageUrl: tempImageUrl 
            });
            
            // Reset form input setelah sukses
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputEpisode').value = '';
            document.getElementById('inputPosterFile').value = '';
            tempImageUrl = '';
        });

        function attachEventListeners() {
            // Logika Tambah Kurang Episode
            document.querySelectorAll('.ep-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.currentTarget.dataset.id;
                    let ep = parseInt(e.currentTarget.dataset.ep);
                    let newEp = e.currentTarget.dataset.action === 'plus' ? ep + 1 : Math.max(0, ep - 1);
                    
                    update(ref(db, `users/${currentUserUid}/shows/${id}`), { episode: newEp });
                };
            });
            
            // Logika Hapus Tontonan
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.onclick = (e) => { 
                    if (confirm("Apakah Anda yakin ingin menghapus tontonan ini dari daftar?")) {
                        remove(ref(db, `users/${currentUserUid}/shows/${e.currentTarget.dataset.id}`)); 
                    }
                };
            });
        }
    </script>
</body>
</html>
