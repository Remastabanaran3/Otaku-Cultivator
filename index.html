<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker | Anime & Donghua</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%233b82f6"/><stop offset="100%" stop-color="%23a855f7"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="%231e293b"/><circle cx="50" cy="50" r="42" stroke="url(%23g)" stroke-width="5" stroke-dasharray="25 10" fill="none"/><polygon points="42,32 42,68 70,50" fill="url(%23g)"/></svg>'>
</head>
<body class="min-h-screen p-4 md:p-8 pb-20 flex flex-col relative">

    <div id="loginScreen" class="flex-1 flex flex-col items-center justify-center fade-in">
        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-md w-full shadow-2xl">
            <div class="w-24 h-24 mx-auto mb-6 flex items-center justify-center drop-shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full animate-[spin_20s_linear_infinite]">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="#1e293b" fill-opacity="0.5"/>
                    <circle cx="50" cy="50" r="42" stroke="url(#logoGrad)" stroke-width="3" stroke-dasharray="30 15 10 15" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="35" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6" stroke-dasharray="5 5"/>
                    <polygon points="42,32 42,68 70,50" fill="url(#logoGrad)" filter="url(#glow)"/>
                </svg>
            </div>
            
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-4">Tracker Login</h1>
            <p class="text-slate-400 mb-8">Masuk untuk menyimpan dan menyinkronkan daftar tontonanmu di semua perangkat.</p>
            
            <button id="loginBtn" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 font-bold py-3 px-6 rounded-xl hover:bg-slate-200 transition active:scale-95">
                <svg class="w-6 h-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Lanjutkan dengan Google
            </button>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto w-full hidden fade-in">
        <div class="flex justify-end items-center mb-6 gap-4">
            <button id="logoutBtn" class="p-2 text-slate-400 hover:text-red-400 hover:bg-slate-800 rounded-full transition active:scale-95" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
            <img id="userAvatar" src="" alt="Profile" class="w-9 h-9 md:w-10 md:h-10 rounded-full object-cover cursor-pointer hover:opacity-80 transition ring-2 ring-transparent hover:ring-slate-500">
        </div>

        <header class="mb-10 text-center mt-2 flex flex-col items-center justify-center">
            <div class="w-20 h-20 md:w-24 md:h-24 mb-4 flex items-center justify-center drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full animate-[spin_20s_linear_infinite]">
                    <defs>
                        <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                        <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="#1e293b" fill-opacity="0.5"/>
                    <circle cx="50" cy="50" r="42" stroke="url(#logoGrad2)" stroke-width="3" stroke-dasharray="30 15 10 15" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="35" stroke="url(#logoGrad2)" stroke-width="1" opacity="0.6" stroke-dasharray="5 5"/>
                    <polygon points="42,32 42,68 70,50" fill="url(#logoGrad2)" filter="url(#glow2)"/>
                </svg>
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2 leading-tight">
                Otaku & Cultivator
            </h1>
        </header>

        <div class="glass-panel p-5 md:p-6 rounded-2xl mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <input type="text" id="inputTitle" placeholder="Judul Anime / Donghua..." class="lg:col-span-2 w-full bg-slate-800 border border-slate-600 rounded-lg p-3 md:p-4 focus:outline-none focus:border-blue-400 text-white text-base">
                <select id="inputType" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 md:p-4 focus:outline-none focus:border-blue-400 text-white text-base appearance-none">
                    <option value="Anime">🇯🇵 Anime</option>
                    <option value="Donghua">🇨🇳 Donghua</option>
                </select>
                <input type="number" id="inputEpisode" placeholder="Ep Saat Ini" min="0" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 md:p-4 focus:outline-none focus:border-blue-400 text-white text-base">
                <div class="flex flex-col gap-1 justify-center">
                    <input type="file" id="inputPosterFile" accept="image/*" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2 text-sm text-slate-300 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white cursor-pointer hover:file:bg-blue-500">
                </div>
            </div>
            <div class="mt-6 flex justify-end items-center gap-4">
                <div id="loading" class="loader"></div>
                <button id="addBtn" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 md:py-4 px-8 rounded-lg shadow-lg active:scale-95 transition">
                    + Tambahkan ke Daftar
                </button>
            </div>
        </div>

        <div class="flex justify-center md:justify-start gap-2 mb-6 border-b border-slate-700 pb-4 overflow-x-auto">
            <button onclick="setFilter('All')" class="tab-btn active w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]" data-filter="All">Semua</button>
            <button onclick="setFilter('Anime')" class="tab-btn w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-slate-800 text-slate-400 hover:bg-slate-700" data-filter="Anime">🇯🇵 Anime</button>
            <button onclick="setFilter('Donghua')" class="tab-btn w-full md:w-auto px-6 py-2 rounded-full font-bold transition duration-300 bg-slate-800 text-slate-400 hover:bg-slate-700" data-filter="Donghua">🇨🇳 Donghua</button>
        </div>
        
        <div id="showList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 fade-in"></div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-6 md:p-8 rounded-2xl w-full max-w-md mx-4 shadow-2xl transform transition-transform scale-95">
            <h2 class="text-2xl font-bold mb-6 text-blue-400 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                Edit Tontonan
            </h2>
            <div class="flex flex-col gap-5">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Judul Tontonan</label>
                    <input type="text" id="editTitle" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-400 text-white">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Kategori</label>
                    <select id="editType" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-400 text-white appearance-none">
                        <option value="Anime">🇯🇵 Anime</option>
                        <option value="Donghua">🇨🇳 Donghua</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Ganti Poster</label>
                    <input type="file" id="editPosterFile" accept="image/*" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2 text-sm text-slate-300 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white cursor-pointer hover:file:bg-blue-500">
                </div>
                <div class="flex justify-end gap-3 mt-4 border-t border-slate-700 pt-4">
                    <button type="button" onclick="closeEditModal()" class="px-5 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition active:scale-95">Batal</button>
                    <button type="button" id="saveEditBtn" class="px-5 py-2 rounded-lg bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold transition active:scale-95">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";
        
        // --- PERBAIKAN IMPORT: Menambahkan signInWithRedirect, getRedirectResult, indexedDBLocalPersistence ---
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, indexedDBLocalPersistence } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4HlorZBNwwHFp8LFi9W6yruxbwKhMMcU",
            authDomain: "otaku-cultivator.firebaseapp.com",
            databaseURL: "https://otaku-cultivator-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "otaku-cultivator",
            storageBucket: "otaku-cultivator.firebasestorage.app",
            messagingSenderId: "789190822951",
            appId: "1:789190822951:web:15cffc00d86fe9382cd202"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- PERBAIKAN 1: Gunakan indexedDB untuk penyimpanan terdalam di Android ---
        setPersistence(auth, indexedDBLocalPersistence).catch(err => console.error("Error setting persistence:", err));

        // --- PERBAIKAN 2: Penanganan Jika Aplikasi Dialihkan Kembali (Redirect) ---
        getRedirectResult(auth).catch((error) => {
            if (error.code === 'auth/missing-initial-state') {
                alert("Sistem Keamanan WebView Android memblokir sesi Login Google ini. Solusi Terbaik: Buka otaku-cultivator.vercel.app melalui Google Chrome di HP Anda, lalu pilih 'Tambahkan ke Layar Utama'.");
            } else {
                console.error("Redirect Error:", error);
            }
        });

        let currentUserUid = null;
        let tempImageUrl = '';
        let allShowsData = []; 
        let currentFilter = 'All';
        let editingId = null;
        let editTempImageUrl = '';

        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');

        // --- PERBAIKAN 3: Fallback Cerdas (Popup -> Redirect) ---
        document.getElementById('loginBtn').addEventListener('click', () => {
            // Coba buka menggunakan Popup terlebih dahulu
            signInWithPopup(auth, provider).catch(err => {
                console.warn("Popup diblokir WebView, mencoba Redirect...", err);
                // Jika sistem WebView memblokir popup, paksa gunakan sistem Redirect
                signInWithRedirect(auth, provider);
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                document.getElementById('showList').innerHTML = ''; 
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserUid = user.uid;
                const avatarImg = document.getElementById('userAvatar');
                avatarImg.src = user.photoURL;
                avatarImg.title = user.displayName + " (Login sebagai)";
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                loadUserData(user.uid);
            } else {
                currentUserUid = null;
                mainApp.classList.add('hidden');
                loginScreen.classList.remove('hidden');
            }
        });

        document.getElementById('inputPosterFile').addEventListener('change', function(event) {
            compressImage(event.target.files[0], (compressedBase64) => {
                tempImageUrl = compressedBase64;
            });
        });

        document.getElementById('editPosterFile').addEventListener('change', function(event) {
            compressImage(event.target.files[0], (compressedBase64) => {
                editTempImageUrl = compressedBase64;
            });
        });

        function compressImage(file, callback) {
            if (!file) { callback(''); return; }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scaleSize = 400 / img.width; 
                    canvas.width = 400;
                    canvas.height = img.height * scaleSize;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.7)); 
                }
            };
        }

        function loadUserData(uid) {
            const userShowsRef = ref(db, `users/${uid}/shows`);
            onValue(userShowsRef, (snapshot) => {
                const data = snapshot.val();
                allShowsData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
                renderShowsUI();
            });
        }

        function renderShowsUI() {
            const container = document.getElementById('showList');
            container.innerHTML = '';
            const filteredShows = currentFilter === 'All' ? allShowsData : allShowsData.filter(show => show.type === currentFilter);

            if (filteredShows.length === 0) {
                const pesan = currentFilter === 'All' ? "Belum ada tontonan." : `Belum ada ${currentFilter}.`;
                container.innerHTML = `<p class="text-slate-500 italic col-span-full text-center py-10 fade-in">${pesan}</p>`;
                return;
            }

            filteredShows.forEach((show) => {
                const typeColor = show.type === 'Anime' ? 'bg-blue-900 text-blue-200 border-blue-500' : 'bg-red-900 text-red-200 border-red-500';
                const imageSection = show.imageUrl 
                    ? `<img src="${show.imageUrl}" class="w-full h-56 md:h-48 object-cover object-top">`
                    : `<div class="w-full h-56 md:h-48 image-fallback flex items-center justify-center text-white font-bold text-3xl opacity-80">${show.title.charAt(0)}</div>`;

                const card = document.createElement('div');
                card.className = "glass-panel rounded-xl overflow-hidden flex flex-col fade-in";
                card.innerHTML = `
                    ${imageSection}
                    <div class="p-4 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-4 gap-2">
                            <h3 class="text-lg font-bold leading-tight flex-1 line-clamp-2">${show.title}</h3>
                            <span class="text-[10px] md:text-xs font-semibold px-2 py-1 rounded border ${typeColor} whitespace-nowrap">${show.type}</span>
                        </div>
                        <div class="mt-auto pt-2 flex items-center justify-between border-t border-slate-700">
                            <div class="flex items-center gap-2 mt-3">
                                <button data-id="${show.id}" data-ep="${show.episode}" data-action="minus" class="ep-btn w-10 h-10 flex justify-center items-center bg-slate-700 rounded-lg text-xl font-bold">-</button>
                                <div class="text-center min-w-[3.5rem]">
                                    <span class="text-[10px] block text-slate-400 uppercase">Episode</span>
                                    <span class="text-2xl font-mono font-bold">${show.episode}</span>
                                </div>
                                <button data-id="${show.id}" data-ep="${show.episode}" data-action="plus" class="ep-btn w-10 h-10 flex justify-center items-center bg-blue-600 rounded-lg text-xl font-bold">+</button>
                            </div>
                            <div class="flex gap-1 mt-3">
                                <button onclick="openEditModal('${show.id}')" class="text-slate-400 hover:text-blue-400 p-2 transition"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                                <button data-id="${show.id}" class="del-btn text-slate-400 hover:text-red-400 p-2 transition"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg></button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            attachEventListeners();
        }

        window.setFilter = function(filterType) {
            currentFilter = filterType;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.getAttribute('data-filter') === filterType) {
                    btn.className = "tab-btn active w-full md:w-auto px-6 py-2 rounded-full font-bold bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]";
                } else {
                    btn.className = "tab-btn w-full md:w-auto px-6 py-2 rounded-full font-bold bg-slate-800 text-slate-400 hover:bg-slate-700";
                }
            });
            renderShowsUI();
        }

        window.openEditModal = function(id) {
            const show = allShowsData.find(s => s.id === id);
            if (!show) return;
            editingId = id;
            document.getElementById('editTitle').value = show.title;
            document.getElementById('editType').value = show.type;
            editTempImageUrl = show.imageUrl || '';
            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); modal.querySelector('.glass-panel').classList.replace('scale-95', 'scale-100'); }, 10);
        }

        window.closeEditModal = function() {
            const modal = document.getElementById('editModal');
            modal.classList.add('opacity-0');
            modal.querySelector('.glass-panel').classList.replace('scale-100', 'scale-95');
            setTimeout(() => { modal.classList.add('hidden'); editingId = null; }, 300);
        }

        document.getElementById('saveEditBtn').addEventListener('click', async () => {
            if (!editingId || !currentUserUid) return;
            const newTitle = document.getElementById('editTitle').value.trim();
            if (!newTitle) return alert("Judul kosong!");
            await update(ref(db, `users/${currentUserUid}/shows/${editingId}`), { title: newTitle, type: document.getElementById('editType').value, imageUrl: editTempImageUrl });
            closeEditModal();
        });

        document.getElementById('addBtn').addEventListener('click', async () => {
            if (!currentUserUid) return alert("Login dulu!");
            const title = document.getElementById('inputTitle').value.trim();
            if (!title) return alert("Judul kosong!");
            document.getElementById('loading').style.display = 'block';
            await push(ref(db, `users/${currentUserUid}/shows`), { title, type: document.getElementById('inputType').value, episode: parseInt(document.getElementById('inputEpisode').value) || 0, imageUrl: tempImageUrl });
            document.getElementById('inputTitle').value = '';
            document.getElementById('loading').style.display = 'none';
        });

        function attachEventListeners() {
            document.querySelectorAll('.ep-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.currentTarget.dataset.id;
                    let ep = parseInt(e.currentTarget.dataset.ep);
                    let newEp = e.currentTarget.dataset.action === 'plus' ? ep + 1 : Math.max(0, ep - 1);
                    update(ref(db, `users/${currentUserUid}/shows/${id}`), { episode: newEp });
                };
            });
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.onclick = (e) => { if(confirm("Hapus?")) remove(ref(db, `users/${currentUserUid}/shows/${e.currentTarget.dataset.id}`)); };
            });
        }
    </script>
</body>
</html>
